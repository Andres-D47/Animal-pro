<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Servicio - Pro Animal</title>
    <link rel="stylesheet" href="css/servicios.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
     <header class="header-principal">
        <div class="contenedor-header">
            <div class="logo">
                <img src="assets/img/Animal-pro.jpeg" alt="Logo Animal Pro">
            </div>

            <nav class="navegacion">
                    <a href="index.html" class="activo">Inicio</a>
                    <a href="servicios.html">Servicios</a>
                    <a href="tienda.html">Tienda</a>
                    <a href="contacto.html">Contacto</a>
            </nav>

            <div class="utilidades">
                <button class="btn-icono">🔍</button>
                <button class="btn-icono">👤</button>
                <button class="btn-icono">🛒</button>
            </div>
        </div>
    </header>

    <main class="detail-container">
        <a href="servicios.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Volver
        </a>

        <div class="detail-main-card">
            <div class="detail-image">
                <img id="detalle-img" src="" alt="">
            </div>
            <div class="detail-info">
                <h1 id="detalle-titulo">Cargando...</h1>
                <div class="stars">
                    <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                </div>
                <p class="description" id="detalle-desc"></p>
                <p class="category"><strong>Categoría:</strong> <span id="detalle-cat"></span></p>
                <p class="price"><strong>Precio:</strong> <span id="detalle-precio"></span></p>
                
                <div class="action-buttons">
                    <button id="btn-favorito" class="btn-favorito" onclick="toggleFavorito()">
                        <i class="far fa-heart"></i> Añadir a Favoritos
                    </button>
                    <button class="btn-contactar" onclick="window.location.href='contacto.html'">
                        Contactar
                    </button>
                </div>
            </div>
        </div>

        <div class="additional-info-card">
            <h3>Información Adicional</h3>
            <div class="info-grid">
                <div class="info-box">
                    <h4>Duración</h4>
                    <p>Varía según el servicio</p>
                </div>
                <div class="info-box">
                    <h4>Disponibilidad</h4>
                    <p>Lunes a Sábado</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-principal">
        <div class="contenedor-footer">
            <nav class="footer-nav">
                <a href="#">Contáctanos</a>
                <span class="divisor">|</span>
                <a href="#">Redes</a>
                <span class="divisor">|</span>
                <a href="#">Información</a>
            </nav>
        </div>
    </footer>

    <script src="js/servicios.js"></script>
</body>
</html>
