<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <header class="header-principal">
        <div class="contenedor-header">
            <div class="logo">
                <img src="assets/img/Animal-pro.jpeg" alt="Logo Animal Pro">
            </div>

            <nav class="navegacion">
                    <a href="index.html" class="activo">Inicio</a>
                    <a href="servicios.html">Servicios</a>
                    <a href="tienda.html">Tienda</a>
                    <a href="contacto.html">Contacto</a>
            </nav>

            <div class="utilidades">
                <button class="btn-icono">🔍</button>
                <button class="btn-icono">👤</button>
                <button class="btn-icono">🛒</button>
            </div>
        </div>

    </header>
    
    <!-- CONTENIDO PRINCIPAL -->

    <header class="hero-figma">
        <div class="contenido-hero">
            <span class="pata-decoracion">🐾</span>
            <h1>¡Bienvenido a Animal Pro!</h1>
            <p>"Todo lo que tu mascota necesita en un lugar"</p>
            <a href="#" class="boton-primario">Ver Servicios</a>
        </div>
    </header>
    <section class="seccion-buscados">
        <div class="contenedor">
            <h2 class="subtitulo">⭐ LOS MÁS BUSCADOS</h2>
            <div class="grid-buscados">
                <div class="item">
                    <div class="caja-blanca">
                        <img src="img/bano.png" alt="Baño">
                    </div>
                    <p>Baño</p>
                </div>
                <div class="item">
                    <div class="caja-blanca">
                        <img src="img/vet.png" alt="Veterinaria">
                    </div>
                    <p>Veterinaria</p>
                </div>
                <div class="item">
                    <div class="caja-blanca">
                        <img src="img/guarderia.png" alt="Guardería">
                    </div>
                    <p>Guardería</p>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer-principal">
        <div class="contenedor-footer">
        <nav class="footer-nav">
            <a href="#">Contáctanos</a>
            <span class="divisor">|</span>
            <a href="#">Redes</a>
            <span class="divisor">|</span>
            <a href="#">Información</a>
        </nav>
    </div>
    </footer>

    <script src="js/app.js"></script>
